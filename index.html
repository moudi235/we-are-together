<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>We Are Together - Iftar</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Cairo', Arial;
  background:linear-gradient(135deg,#cbd5e1,#f0f9ff);
  color:#000;
}

/* خلفية زخرفية */
.bg-pattern{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,215,0,.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,215,0,.06), transparent 40%);
  pointer-events:none;
}

/* فوانيس */
.lantern{
  position:fixed;
  top:-60px;
  width:40px;
  opacity:.3;
  animation:float 12s linear infinite;
  pointer-events:none;
  z-index:0;
}
.l1{ left:10%; animation-delay:0s; }
.l2{ left:40%; animation-delay:3s; }
.l3{ left:60%; animation-delay:6s; }
.l4{ left:80%; animation-delay:9s; }

@keyframes float{
  0%{ transform:translateY(0); }
  100%{ transform:translateY(120vh); }
}

/* الحاوية */
.container{
  max-width:480px;
  margin:40px auto;
  padding:20px;
}

/* البطاقة */
.card{
  background:rgba(255,255,255,0.8);
  border-radius:20px;
  padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}

/* العنوان */
.title{
  text-align:center;
  margin:10px 0 5px;
  font-size:26px;
  font-weight:700;
}

.subtitle{
  text-align:center;
  opacity:.8;
  margin-bottom:18px;
}

/* صورة الإفطار */
.hero{
  width:100%;
  border-radius:14px;
  margin-bottom:16px;
}

/* الحالة */
.status{
  text-align:center;
  font-weight:600;
  margin:10px 0 16px;
  color:#ff8c00;
}

/* الحقول */
input{
  width:100%;
  padding:13px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:15px;
}

/* الزر */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#f59e0b,#fbbf24);
  color:#000;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
  transition:.25s;
}

button:hover{
  transform:translateY(-1px);
}

/* زر اللغة */
.lang{
  background:transparent;
  color:#000;
  border:1px solid rgba(0,0,0,.25);
  margin-bottom:10px;
}

/* رسالة النجاح */
.message{
  text-align:center;
  margin-top:12px;
  font-weight:600;
}
</style>
</head>

<body>
  <!-- Lanterns -->
  <img src="lantern.png" class="lantern l1">
  <img src="lantern.png" class="lantern l2">
  <img src="lantern.png" class="lantern l3">
  <img src="lantern.png" class="lantern l4">

<div class="bg-pattern"></div>

<div class="container">
  <div class="card">
    <div class="title" id="title">We Are Together</div>
    <div class="subtitle" id="subtitle">Community Ramadan Iftar</div>

    <img src="iftar.jpg" class="hero" alt="Iftar">

    <button class="lang" onclick="toggleLang()">🌐 عربي / English</button>

    <div id="status" class="status">Loading...</div>

    <form id="form">
      <input id="firstName" required placeholder="First Name">
      <input id="lastName" required placeholder="Last Name">
      <input id="email" type="email" required placeholder="Email">
      <input id="phone" required placeholder="Phone">
      <input id="guest1First" placeholder="Guest 1 Full name (optional)">
      <input id="guest2First" placeholder="Guest 2 Full name (optional)">
      <button type="submit" id="submitBtn">Register</button>
    </form>

    <div id="message" class="message"></div>
  </div>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDZZDoFx4-8Ngac7JR36WO67YUCqabw0kA",
  authDomain: "we-are-together-b770f.firebaseapp.com",
  projectId: "we-are-together-b770f",
  storageBucket: "we-are-together-b770f.firebasestorage.app",
  messagingSenderId: "698473057651",
  appId: "1:698473057651:web:13e14bcef84329fd2dc906"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Limits
const MAX_MAIN = 100;
const MAX_TOTAL = 120;
let currentCount = 0;
let isArabic = false;

// Elements
const form = document.getElementById("form");
const status = document.getElementById("status");
const message = document.getElementById("message");
const firstName = document.getElementById("firstName");
const lastName = document.getElementById("lastName");
const email = document.getElementById("email");
const phone = document.getElementById("phone");
const guest1El = document.getElementById("guest1First");
const guest2El = document.getElementById("guest2First");
const submitBtn = document.getElementById("submitBtn");

// Language toggle
function toggleLang(){
  isArabic = !isArabic;
  applyLang();
}

function applyLang(){
  if(isArabic){
    document.documentElement.lang="ar";
    title.textContent="نحن معاً";
    subtitle.textContent="دعوة إفطار رمضاني";
    firstName.placeholder="الاسم";
    lastName.placeholder="اللقب";
    email.placeholder="البريد الإلكتروني";
    phone.placeholder="رقم الهاتف";
    guest1El.placeholder="ضيف 1 (اختياري)";
    guest2El.placeholder="ضيف 2 (اختياري)";
    submitBtn.textContent="تسجيل";
  }else{
    document.documentElement.lang="en";
    title.textContent="We Are Together";
    subtitle.textContent="Community Ramadan Iftar";
    firstName.placeholder="First Name";
    lastName.placeholder="Last Name";
    email.placeholder="Email";
    phone.placeholder="Phone";
    guest1El.placeholder="Guest 1 Full name (optional)";
    guest2El.placeholder="Guest 2 Full name (optional)";
    submitBtn.textContent="Register";
  }
  updateStatus();
}

// Load current count from Firebase
async function loadCount(){
  const snap = await db.collection("registrations").get();
  currentCount = 0;
  snap.forEach(doc => {
    currentCount++; // main person
    const data = doc.data();
    if(data.guest1) currentCount++;
    if(data.guest2) currentCount++;
  });
  updateStatus();
}
loadCount();

// Update status display
function updateStatus(){
  if(currentCount < MAX_TOTAL){
    status.textContent = isArabic
      ? `عدد المسجلين: ${currentCount}`
      : `People Registered: ${currentCount}`;
  } else {
    status.textContent = isArabic
      ? "❌ تم إغلاق التسجيل. عذرًا، لقد وصلنا إلى الحد الأقصى من المشاركين"
      : "❌ Registration closed. Sorry! We reached the maximum number of people.";
    form.style.display="none";
  }
}

// Submit form
form.addEventListener("submit", async e=>{
  e.preventDefault();

  if(currentCount >= MAX_TOTAL) return;

  const emailVal = email.value.trim();
  const guest1 = guest1El.value.trim();
  const guest2 = guest2El.value.trim();

  // Check duplicate email
  const dup = await db.collection("registrations").where("email","==",emailVal).get();
  if(!dup.empty){
    message.textContent = isArabic
      ? "⚠️ هذا الإيميل مسجل مسبقاً"
      : "⚠️ Email already registered";
    return;
  }

  // Count new registrants including guests
  let newCount = 1;
  if(guest1) newCount++;
  if(guest2) newCount++;

  if(currentCount + newCount > MAX_TOTAL){
    message.textContent = isArabic
      ? "❌ عدد المسجلين مع الضيوف تجاوز الحد المسموح"
      : "❌ Total registrations would exceed the limit";
    return;
  }

  // Add to Firebase
  await db.collection("registrations").add({
    firstName:firstName.value.trim(),
    lastName:lastName.value.trim(),
    email:emailVal,
    phone:phone.value.trim(),
    guest1: guest1 || "",
    guest2: guest2 || "",
    type:"pending",
    time:new Date()
  });

  currentCount += newCount;

  message.textContent = isArabic
    ? "✅ تم استلام طلبك. سيتم تأكيد مكانك وتزويدك بموقع الإفطار عبر البريد أو الهاتف"
    : "✅ Registration received. We will confirm your place and provide the Iftar location via email or phone.";

  form.reset();
  updateStatus();
});
</script>
</body>
</html>
